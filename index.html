<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tính dây đồng motor</title>
<style>
body{margin:0;font-family:monospace;background:#f2f2f2;display:flex;justify-content:center;padding:30px 15px}
.box{width:520px;max-width:100%;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
input{width:100%;padding:10px;box-sizing:border-box;border:3px solid #333;border-radius:6px;font-size:16px;margin-top:4px}
hr{margin:20px 0}
</style>
</head>
<body>
<div class="box">
<h2>TÍNH DÂY</h2>
<h3>Nhập đường kính dây (cách nhau bằng dấu cách, dấu phẩy hoặc xuống dòng)</h3>
<input id="input" type="text" inputmode="decimal" autocomplete="off" placeholder="0.55 0.55 0.60">
<div id="top" style="margin-top:15px"></div>
<div id="kq" style="margin-top:15px"></div>
<hr>
<h2>CHUYỂN 1 PHA → 3 PHA</h2>
<h3>Tổng số vòng</h3>
<input id="tongVong" type="number" inputmode="numeric">
<h3>Số sợi đang quấn</h3>
<input id="soSoi" type="number" inputmode="numeric">
<h3>Đường kính dây hiện tại</h3>
<input id="duongKinh" type="text" inputmode="decimal" autocomplete="off" placeholder="0.55 0.55 0.55">
<div id="doi3pha" style="margin-top:15px"></div>
</div>
<script>
const input=document.getElementById("input"),topDiv=document.getElementById("top"),kq=document.getElementById("kq");
const tongVong=document.getElementById("tongVong"),soSoi=document.getElementById("soSoi"),duongKinh=document.getElementById("duongKinh"),doi3pha=document.getElementById("doi3pha");
[input,tongVong,soSoi,duongKinh].forEach(e=>e.addEventListener("input",()=>{tinh();tinh3P();}));
function tongTietDien(text){
 text=(text||"").replace(/,/g," ").replace(/\n/g," ");
 let arr=text.trim().split(/\s+/),tong=0;
 for(let a of arr){let d=parseFloat(a);if(!isNaN(d))tong+=Math.PI*d*d/4;}
 return tong;
}
function tinh(){
 let tong=tongTietDien(input.value);
 if(tong<=0){topDiv.innerHTML="";kq.innerHTML="";return;}
 let dTong=Math.sqrt(4*tong/Math.PI);
 topDiv.innerHTML=`<b>Đường kính tương đương:</b><br>${dTong.toFixed(3)} mm<br><br>Tiết diện: ${tong.toFixed(3)} mm²<br>Dòng chịu được ≈ ${(tong*4.2).toFixed(2)} A`;
 let h="";
 for(let i=2;i<=10;i++){let d=Math.sqrt((4*(tong/i))/Math.PI);h+=`${i} sợi: ${d.toFixed(3)} mm<br>`;}
 kq.innerHTML=h;
}
function tinh3P(){
 let v=parseFloat(tongVong.value),s=parseFloat(soSoi.value),tong=tongTietDien(duongKinh.value);
 if(isNaN(v)||isNaN(s)||s<=0||tong<=0){doi3pha.innerHTML="";return;}
 let dTong=Math.sqrt(4*tong/Math.PI),day3=dTong/Math.sqrt(3),vong3=(v/s)/Math.sqrt(3);
 doi3pha.innerHTML=`<b>Đường kính tương đương:</b> ${dTong.toFixed(3)} mm<br><b>Đường kính 3 pha:</b> ${day3.toFixed(3)} mm<br><b>Vòng sau khi chia:</b> ${vong3.toFixed(2)} vòng`;
}
</script>
</body></html>
