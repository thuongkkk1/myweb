<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tính dây đồng motor</title>

<style>

body{
font-family:monospace;
padding:20px;
}

input{
font-size:16px;
padding:6px;
border:3px solid #333;
border-radius:6px;
outline:none;
}

details{
margin:6px 0;
}

summary{
cursor:pointer;
font-weight:bold;
background:#eee;
padding:5px;
border-radius:4px;
}

</style>

</head>

<body>

<h3>Nhập đường kính dây (ví dụ: 0.65,0.65)</h3>
<input id="input" style="width:300px">

<div id="top"></div>

<h3>Nhập công suất motor (kW)</h3>
<input id="kw" style="width:120px">

<div id="kq"></div>

<script>

let input = document.getElementById("input");
let kwInput = document.getElementById("kw");
let topDiv = document.getElementById("top");
let kq = document.getElementById("kq");

input.addEventListener("input", tinh);
kwInput.addEventListener("input", tinh);

function tinh(){

let text = input.value.trim();

if(text==""){
topDiv.innerHTML="";
kq.innerHTML="";
return;
}

let arr = text.split(/[ ,]+/);

let tong=0;

for(let i=0;i<arr.length;i++){

let d=parseFloat(arr[i]);

if(!isNaN(d)){
tong += Math.PI*d*d/4;
}

}

let dTong = Math.sqrt((4*tong)/Math.PI);

let tietDien = tong;

let ampe = tietDien * 5;

let top="";

top+="<b>Đường kính tương đương:</b><br>";
top+=dTong.toFixed(3)+" mm<br><br>";

top+="Tiết diện: "+tietDien.toFixed(3)+" mm²<br>";
top+="Dòng chịu được ≈ "+ampe.toFixed(2)+" A<br><br>";

topDiv.innerHTML = top;

let html="";

let kw = parseFloat(kwInput.value);

if(!isNaN(kw)){

// motor 3 pha
let motor3 = (kw * 1000) / (1.732 * 380 * 0.8 * 0.9);

// motor 1 pha
let motor1 = (kw * 1000) / (220 * 0.8 * 0.9);

}

}

for(let i=2;i<=10;i++){

let s=tong/i;

let d=Math.sqrt((4*s)/Math.PI);

html+=i+" sợi: "+d.toFixed(3)+" mm<br>";

}

html+="<br>----------------<br><br>";

html+="<b>Gợi ý tổ hợp dây (2 → 10 sợi)</b><br><br>";

let target = dTong;

let minDay = 0.30;

if(target > 0.8) minDay = 0.60;
if(target > 1.0) minDay = 0.70;
if(target > 1.5) minDay = 0.80;
if(target > 2.0) minDay = 0.90;

let day = [
0.30,0.35,0.40,0.45,0.50,
0.55,0.60,0.65,0.70,
0.75,0.80,0.85,0.90,
0.95,1.00,1.05,1.10,1.15
].filter(d => d >= minDay);

let tol = 0.01;

let groups={};

function search(combo,start,sumSq){

let n = combo.length;

if(n>=2){

let d = Math.sqrt(sumSq);

if(Math.abs(d-target) < tol){

let key = combo[0].toFixed(2);

if(!groups[key]) groups[key]=[];

groups[key].push(
combo.length+" sợi: "+
combo.join(" , ")+
" → "+d.toFixed(3)+" mm"
);

}

}

if(n>=10) return;

for(let i=start;i<day.length;i++){

let v = day[i];

combo.push(v);

search(combo,i,sumSq + v*v);

combo.pop();

}

}

search([],0,0);

for(let g in groups){

html+="<details>";

html+="<summary>Dây "+g+" mm ("+groups[g].length+" kết quả)</summary>";

html+=groups[g].join("<br>");

html+="</details>";

}

kq.innerHTML=html;

}

</script>

</body>
</html>
